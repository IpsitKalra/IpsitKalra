name: Render mission-control dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    branches: [main]
    paths:
      - NOW.md
      - TELEMETRY.json
      - scripts/render_signal.py
      - .github/workflows/render-mission-control.yml

permissions:
  contents: write

concurrency:
  group: profile-dashboard
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render SVG dashboards
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: ${{ github.repository_owner }}
          # Optional: add this repository secret for live Anthropic organization usage.
          ANTHROPIC_ADMIN_KEY: ${{ secrets.ANTHROPIC_ADMIN_KEY }}
        run: python scripts/render_signal.py

      - name: Commit changed dashboard
        run: |
          if git diff --quiet -- assets/; then
            echo "Dashboard is already current."
            exit 0
          fi
          git config user.name "mission-control[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/mission-control-*.svg
          git commit -m "chore: refresh profile mission control"
          git push
