<svg xmlns="http://www.w3.org/2000/svg" width="980" height="410" viewBox="0 0 980 410" role="img" aria-labelledby="title desc">
<title id="title">Mission control dashboard for Ipsit Kalra</title>
<desc id="desc">A live developer telemetry panel showing personalized metrics, current work, active repositories, languages, and refresh time.</desc>
<defs>
  <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#79c0ff" stop-opacity="0.75"/>
    <stop offset="0.55" stop-color="#7ee787" stop-opacity="0.2"/>
    <stop offset="1" stop-color="#e3b341" stop-opacity="0.65"/>
  </linearGradient>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="microgrid" width="24" height="24" patternUnits="userSpaceOnUse">
    <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#30363d" stroke-width="0.6" opacity="0.45"/>
  </pattern>
</defs>

<rect width="980" height="410" rx="22" fill="#0d1117"/>
<rect x="1" y="1" width="978" height="408" rx="21" fill="none" stroke="url(#frame)" stroke-width="2"/>
<rect x="18" y="18" width="944" height="374" rx="16" fill="#161b22"/>
<rect x="18" y="18" width="944" height="374" rx="16" fill="url(#microgrid)"/>

<!-- Radar -->
<g>
  <circle cx="162" cy="188" r="120" fill="none" stroke="#30363d" stroke-width="1"/>
  <circle cx="162" cy="188" r="86" fill="none" stroke="#30363d" stroke-width="1"/>
  <circle cx="162" cy="188" r="51" fill="none" stroke="#30363d" stroke-width="1"/>
  <line x1="42" y1="188" x2="282" y2="188" stroke="#30363d" opacity="0.75"/>
  <line x1="162" y1="68" x2="162" y2="308" stroke="#30363d" opacity="0.75"/>
  <g transform="translate(0 10)">
    <circle cx="162" cy="178" r="107" fill="none" stroke="#7ee787" stroke-width="3" stroke-dasharray="9 15" opacity="0.65">
      <animateTransform attributeName="transform" type="rotate" from="0 162 178" to="360 162 178" dur="18s" repeatCount="indefinite"/>
    </circle>
    <path d="M162 178 L162 70 A108 108 0 0 1 257 127 Z" fill="#79c0ff" opacity="0.11">
      <animateTransform attributeName="transform" type="rotate" from="0 162 178" to="360 162 178" dur="7s" repeatCount="indefinite"/>
    </path>
    <line x1="162" y1="178" x2="162" y2="70" stroke="#79c0ff" stroke-width="2" opacity="0.9" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="0 162 178" to="360 162 178" dur="7s" repeatCount="indefinite"/>
    </line>
    <circle cx="166" cy="75" r="2" fill="#79c0ff" opacity="0.75"><animate attributeName="opacity" values="0.25;0.95;0.25" dur="4s" begin="1.0s" repeatCount="indefinite"/></circle>
<circle cx="205" cy="145" r="4" fill="#79c0ff" opacity="0.75"><animate attributeName="opacity" values="0.25;0.95;0.25" dur="3s" begin="0.3s" repeatCount="indefinite"/></circle>
<circle cx="237" cy="179" r="3" fill="#79c0ff" opacity="0.75"><animate attributeName="opacity" values="0.25;0.95;0.25" dur="5s" begin="2.7s" repeatCount="indefinite"/></circle>
<circle cx="137" cy="175" r="3" fill="#79c0ff" opacity="0.75"><animate attributeName="opacity" values="0.25;0.95;0.25" dur="5s" begin="1.3s" repeatCount="indefinite"/></circle>
<circle cx="224" cy="157" r="2" fill="#79c0ff" opacity="0.75"><animate attributeName="opacity" values="0.25;0.95;0.25" dur="7s" begin="1.3s" repeatCount="indefinite"/></circle>
<circle cx="114" cy="161" r="3" fill="#79c0ff" opacity="0.75"><animate attributeName="opacity" values="0.25;0.95;0.25" dur="7s" begin="2.7s" repeatCount="indefinite"/></circle>
<circle cx="107" cy="136" r="2" fill="#79c0ff" opacity="0.75"><animate attributeName="opacity" values="0.25;0.95;0.25" dur="5s" begin="0.3s" repeatCount="indefinite"/></circle>
<circle cx="167" cy="136" r="2" fill="#79c0ff" opacity="0.75"><animate attributeName="opacity" values="0.25;0.95;0.25" dur="5s" begin="0.3s" repeatCount="indefinite"/></circle>
<circle cx="133" cy="163" r="3" fill="#79c0ff" opacity="0.75"><animate attributeName="opacity" values="0.25;0.95;0.25" dur="6s" begin="0.3s" repeatCount="indefinite"/></circle>
<circle cx="235" cy="187" r="2" fill="#79c0ff" opacity="0.75"><animate attributeName="opacity" values="0.25;0.95;0.25" dur="3s" begin="2.3s" repeatCount="indefinite"/></circle>
<circle cx="121" cy="75" r="2" fill="#79c0ff" opacity="0.75"><animate attributeName="opacity" values="0.25;0.95;0.25" dur="4s" begin="1.0s" repeatCount="indefinite"/></circle>
<circle cx="189" cy="249" r="2" fill="#79c0ff" opacity="0.75"><animate attributeName="opacity" values="0.25;0.95;0.25" dur="7s" begin="2.0s" repeatCount="indefinite"/></circle>
<circle cx="104" cy="165" r="4" fill="#79c0ff" opacity="0.75"><animate attributeName="opacity" values="0.25;0.95;0.25" dur="7s" begin="1.0s" repeatCount="indefinite"/></circle>
<circle cx="166" cy="112" r="2" fill="#79c0ff" opacity="0.75"><animate attributeName="opacity" values="0.25;0.95;0.25" dur="4s" begin="1.3s" repeatCount="indefinite"/></circle>
<circle cx="117" cy="97" r="2" fill="#79c0ff" opacity="0.75"><animate attributeName="opacity" values="0.25;0.95;0.25" dur="5s" begin="2.3s" repeatCount="indefinite"/></circle>
<circle cx="59" cy="179" r="2" fill="#79c0ff" opacity="0.75"><animate attributeName="opacity" values="0.25;0.95;0.25" dur="7s" begin="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="162" cy="178" r="6" fill="#7ee787" filter="url(#glow)"/>
  </g>
  <text x="162" y="344" text-anchor="middle" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="2">CHAOS SIGNAL RADAR</text>
</g>

<!-- Header -->
<text x="326" y="63" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" letter-spacing="2.2">MISSION CONTROL // IPSITKALRA</text>
<text x="326" y="100" fill="#f0f6fc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="28" font-weight="700">Ipsit Kalra</text>
<circle cx="930" cy="57" r="5" fill="#7ee787" filter="url(#glow)">
  <animate attributeName="opacity" values="0.35;1;0.35" dur="2s" repeatCount="indefinite"/>
</circle>
<text x="916" y="62" text-anchor="end" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="1.5">ONLINE-ISH</text>
<text x="326" y="126" fill="#8b949e" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">I like taking hard problems from 0 to 1.</text>

<!-- Questionable telemetry -->
<g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  
  <rect x="326" y="145" width="194" height="68" rx="11" fill="#0d1117" stroke="#30363d"/>
  <text x="340" y="166" fill="#8b949e" font-size="9.5" letter-spacing="0.6">CLAUDE TOKENS SACRIFICED</text>
  <text x="340" y="192" fill="#f0f6fc" font-size="21" font-weight="700">2.7M</text>
  <text x="340" y="207" fill="#8b949e" font-size="8.5">this month · probably worth it</text>
  <rect x="532" y="145" width="194" height="68" rx="11" fill="#0d1117" stroke="#30363d"/>
  <text x="546" y="166" fill="#8b949e" font-size="9.5" letter-spacing="0.6">&quot;QUICK FIXES&quot; ATTEMPTED</text>
  <text x="546" y="192" fill="#f0f6fc" font-size="21" font-weight="700">14</text>
  <text x="546" y="207" fill="#8b949e" font-size="8.5">0 remained quick</text>
  <rect x="738" y="145" width="194" height="68" rx="11" fill="#0d1117" stroke="#30363d"/>
  <text x="752" y="166" fill="#8b949e" font-size="9.5" letter-spacing="0.6">BUGS PROMOTED TO FEATURES</text>
  <text x="752" y="192" fill="#f0f6fc" font-size="21" font-weight="700">06</text>
  <text x="752" y="207" fill="#8b949e" font-size="8.5">marketing approved</text>
</g>

<!-- Signal lines -->
<g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <text x="326" y="242" fill="#79c0ff" font-size="12" letter-spacing="1.5">CURRENT TRANSMISSION</text>
  <text x="326" y="263" fill="#f0f6fc" font-size="14">Building entity-resolution systems that turn messy location data</text>
  <text x="326" y="282" fill="#f0f6fc" font-size="14">into decisions.</text>
  <text x="326" y="313" fill="#79c0ff" font-size="12" letter-spacing="1.5">ACTIVE REPOSITORIES</text>
  <text x="326" y="334" fill="#f0f6fc" font-size="14">IpsitKalra  ·  instanet-graph-clusterer</text>
  <text x="326" y="360" fill="#e3b341" font-size="11">CURRENT SANITY: CACHED · COFFEE-to-COMMIT LATENCY: 11m</text>
  <text x="326" y="381" fill="#8b949e" font-size="11">LANGUAGE SIGNALS  Python · TypeScript · React · Next.js · SQL</text>
  <text x="932" y="381" text-anchor="end" fill="#8b949e" font-size="10">REFRESHED 2026-07-19 08:32 UTC</text>
</g>
</svg>