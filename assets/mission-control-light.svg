  <text x="342" y="207" fill="#656d76" font-size="9">this month · probably worth it</text>
  <rect x="514" y="145" width="176" height="68" rx="11" fill="#f6f8fa" stroke="#d8dee4"/>
  <text x="530" y="166" fill="#656d76" font-size="10" letter-spacing="1.05">&quot;QUICK FIXES&quot; ATTEMPTED</text>
  <text x="530" y="192" fill="#1f2328" font-size="21" font-weight="700">14</text>
  <text x="530" y="207" fill="#656d76" font-size="9">0 remained quick</text>
  <rect x="702" y="145" width="230" height="68" rx="11" fill="#f6f8fa" stroke="#d8dee4"/>
  <text x="718" y="166" fill="#656d76" font-size="10" letter-spacing="1.05">BUGS PROMOTED TO FEATURES</text>
  <text x="718" y="192" fill="#1f2328" font-size="21" font-weight="700">06</text>
  <text x="718" y="207" fill="#656d76" font-size="9">marketing approved</text>
</g>

<!-- Signal lines -->
<g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <text x="326" y="246" fill="#0969da" font-size="12" letter-spacing="1.5">CURRENT TRANSMISSION</text>
  <text x="326" y="270" fill="#1f2328" font-size="15">Building a small thing with an unusually large amount of care.</text>

  <text x="326" y="303" fill="#0969da" font-size="12" letter-spacing="1.5">ACTIVE REPOSITORIES</text>
  <text x="326" y="326" fill="#1f2328" font-size="14">project-alpha  ·  project-orbit  ·  project-signal</text>

  <text x="326" y="353" fill="#9a6700" font-size="11">CURRENT SANITY: CACHED · COFFEE-to-COMMIT LATENCY: 11m</text>
  <text x="326" y="376" fill="#656d76" font-size="11">LANGUAGE SIGNALS  TypeScript  ·  Python  ·  YOUR_STACK</text>
  <text x="932" y="376" text-anchor="end" fill="#656d76" font-size="10">REFRESHED 2026-07-10 18:58 UTC</text>
</g>
</svg>